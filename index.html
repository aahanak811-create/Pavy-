<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Pavy 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    color:white;
    background:#111;
}

/* Scenes */

.scene{
    position:absolute;
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    background-size:cover;
    background-position:center;
}

.active{
    display:flex;
    animation:fade 1.5s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}


/* Glass box */

.box{
    width:90%;
    max-width:550px;
    padding:30px;
    border-radius:30px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
    box-shadow:0 0 30px rgba(255,255,255,.2);
}

h1,h2{
    font-weight:500;
    line-height:1.5;
}


/* Buttons */

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff6fae;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff3f8e;
}


/* Falling effects */

.fall{
    position:absolute;
    top:-20px;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}


/* Music */

.music{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:99;
    background:#ff6fae;
    border-radius:50%;
    width:55px;
    height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
}

</style>

</head>


<body>


<!-- SCENES -->

<div class="scene active" style="background-image:url('https://images.unsplash.com/photo-1497250681960-ef046c08a56e');">
<div class="box">
<h2 id="text1"></h2>
<button onclick="next()">Open 💗</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1490750967868-88aa4486c946');">
<div class="box">
<h2 id="text2"></h2>
<button onclick="next()">Next 🌸</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9');">
<div class="box">
<h2 id="text3"></h2>
<button onclick="next()">Continue 🧸</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1511497584788-876760111969');">
<div class="box">
<h2 id="text4"></h2>
<button onclick="next()">Next ✨</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');">
<div class="box">
<h2 id="text5"></h2>
<button onclick="next()">Almost there 💕</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05');">
<div class="box">
<h2 id="text6"></h2>
<button onclick="next()">One more 🥺</button>
</div>
</div>


<div class="scene" style="background-image:url('https://images.unsplash.com/photo-1497436072909-60f360e1d4b1');">
<div class="box">
<h2 id="text7"></h2>
<button onclick="bloom()">Finish 🌸</button>
</div>
</div>



<button class="music" onclick="playMusic()">🎵</button>

<audio id="song" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4c9d.mp3">
</audio>



<script>


let current=0;

let scenes=document.querySelectorAll(".scene");


function next(){

scenes[current].classList.remove("active");

current++;

scenes[current].classList.add("active");

}



function type(id,text){

let i=0;

let element=document.getElementById(id);

function write(){

if(i<text.length){

element.innerHTML+=text.charAt(i);

i++;

setTimeout(write,45);

}

}

write();

}



type("text1",
"Hey Pavy... 💗 I know things have been a little heavy lately... so I made this tiny place just for you 🥺");


type("text2",
"Welcome to your little garden 🌸 A place where you can breathe, smile and remember that you are loved.");


type("text3",
"Even the prettiest flowers have cloudy days... but that doesn't make them any less beautiful 🌷");


type("text4",
"So when you're tired, remember... you don't have to be perfect every second. You are already enough 🤍");


type("text5",
"Mr. Handsome 😌✨ even on your bad days you still look amazing. Don't argue with me, I said what I said 💗");


type("text6",
"I'll annoy you, support you, laugh with you and remind you how special you are 🧸");


type("text7",
"Pavy... keep smiling okay? 🌸 This world is better with your smile in it. Love you 💕");




function bloom(){

for(let i=0;i<80;i++){

let flower=document.createElement("div");

flower.className="fall";

flower.innerHTML=Math.random()>0.5?"🌸":"💗";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=(3+Math.random()*5)+"s";

flower.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(flower);

}

}



function playMusic(){

document.getElementById("song").play();

}


</script>


</body>
</html>
